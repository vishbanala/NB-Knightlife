<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NB KnightLife</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      text-align: center;
      border: 1px solid #DC143C;
      border-radius: 16px;
      padding: 40px 32px;
    }
    h1 { color: #DC143C; font-size: 2rem; margin-bottom: 12px; }
    p { color: #ccc; line-height: 1.6; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #DC143C;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NB KnightLife</h1>
    <p>Rutgers nightlife app — events, maps, and Safe Walk location sharing for trusted contacts.</p>
    <a href="https://github.com/vishbanala/NB-Knightlife">View on GitHub</a>
  </div>
</body>
</html>
